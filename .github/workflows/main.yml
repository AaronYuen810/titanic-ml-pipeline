name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0 # see https://github.com/astral-sh/setup-uv/releases/tag/v8.0.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run linter
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/

  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    needs: test # Only run if the 'test' job (Ruff/Pytest) succeeds
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # only run if push to main branch
    permissions:
      contents: read
      packages: write # write permission required to push to GHCR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }} # use repository name as the image name
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # use dockerfile in the root directory
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha # enable faster builds by caching from Github Actions
          cache-to: type=gha,mode=max # cache to Github Actions
    
